<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ISLAND BOYS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="containerPanel">

        <!-- INTRO VIDEO SCREEN -->
        <div id="introPanel" class="screen active">
            <video id="introVideo" src="assets/introclip.mp4" playsinline muted></video>
            <button id="skipIntroBtn">SKIP ▶</button>
        </div>

        <!-- HOME MOVEMENT SCREEN -->
        <div id="homePanel" class="screen">
            <button id="playBtn" class="action-trigger"></button>
            <button id="homeTutBtn" class="action-trigger"></button>
            <button id="homeExitBtn" class="action-trigger"></button>
        </div>

        <!-- TUTORIAL INFORMATION DISPLAY SCREEN -->
        <div id="tutorialPanel" class="screen">
            <button id="tutBackBtn" class="action-trigger"></button>
        </div>

        <!-- THE MAIN ACTIVE GAME INTERFACE FRAME -->
        <div id="activeGamePanel" class="screen">
            <canvas id="gameCanvas" width="600" height="1080"></canvas>

            <!-- Pause button sits ABOVE canvas via z-index -->
            <button id="gamePauseBtn" class="action-trigger"></button>

            <!-- Desktop roll button -->
            <button id="rollBtn" class="action-trigger"></button>

            <!-- MOBILE CONTROLLER -->
            <div id="mobileControls" class="mobile-controls-container">
                <button id="moveUpBtn"    class="move-btn move-up"    title="Move Up">▲</button>
                <button id="moveLeftBtn"  class="move-btn move-left"  title="Move Left">◀</button>
                <button id="moveRightBtn" class="move-btn move-right" title="Move Right">▶</button>
                <button id="rollBtnMobile" title="Roll"></button>
                <button id="acceptBtn"  title="Accept (Y)">Y</button>
                <button id="declineBtn" title="Decline (N)">N</button>
            </div>

            <!-- POWER-UP OVERLAY PANEL -->
            <div id="powerUpOverlay" class="overlay powerup-overlay">
                <div id="powerUpPanel" class="powerup-panel">
                    <div id="teleportPanel" class="powerup-card teleport-card">
                        <div class="powerup-medallion">?</div>
                        <div class="powerup-label">Select the direction to choose<br>(Will step after rolling operator):</div>
                        <div class="powerup-buttons teleport-buttons">
                            <button class="powerup-btn" data-teleport="L">◀ LEFT</button>
                            <button class="powerup-btn" data-teleport="T">▲ TOP</button>
                            <button class="powerup-btn" data-teleport="R">RIGHT ▶</button>
                        </div>
                    </div>
                    <div id="operatorPanel" class="powerup-card operator-card">
                        <div class="powerup-medallion">⚙</div>
                        <div class="powerup-label">Choose your operation:</div>
                        <div class="powerup-buttons operator-buttons">
                            <button class="powerup-btn" data-operator="+">+</button>
                            <button class="powerup-btn" data-operator="-">−</button>
                            <button class="powerup-btn" data-operator="*">×</button>
                            <button class="powerup-btn" data-operator="/">/</button>
                        </div>
                    </div>
                    <button id="powerUpCancelBtn" class="panel-cancel-btn">CANCEL</button>
                </div>
            </div>
        </div>

        <!-- MODAL PAUSE POPUP -->
        <div id="pauseOverlay" class="overlay">
            <div id="pauseMenuCard">
                <button id="resumeBtn" class="action-trigger"></button>
                <button id="quitBtn"   class="action-trigger"></button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
